project:
  name: telegram-notifier
  description: Telegram notifier starters for Spring Boot 2 and 3

signing:
  active: ALWAYS
  armored: true
  mode: MEMORY
  secretKey: "{{ env.GPG_PRIVATE_KEY }}"
  passphrase: "{{ env.GPG_PASSPHRASE }}"

deploy:
  maven:
    mavenCentral:
      sonatype:
        active: ALWAYS
        url: "https://central.sonatype.com/api/v1/publisher"
        stagingRepositories:
          - "build/staging-deploy"
        username: "{{ env.MAVENCENTRAL_USERNAME }}"
        password: "{{ env.MAVENCENTRAL_PASSWORD }}"
